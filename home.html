<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>POP SENSI🌀 - V26 ELITE</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #0055ff;
            --bg-dark: #020617;
            --card-bg: rgba(6, 18, 45, 0.8);
            --danger: #ff0055;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white;
            padding-bottom: 90px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #020617 100%);
        }

        .nebula {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            animation: moveNebula 15s infinite alternate;
        }

        @keyframes moveNebula { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 40%); } }

        .container { padding: 20px; max-width: 450px; margin: auto; }

        .banner img {
            width: 100%; border-radius: 25px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
            border: 2px solid var(--primary);
        }

        .card {
            margin-top: 20px; background: var(--card-bg);
            padding: 25px 20px; border-radius: 30px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .orbitron { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        .title-main { text-align: center; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin-bottom: 25px; font-size: 24px; }

        .platform { position: relative; display: flex; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 15px; margin-bottom: 25px; }
        .selector { position: absolute; top: 5px; left: 5px; width: calc(33.33% - 7px); height: calc(100% - 10px); background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 12px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .plat { flex: 1; padding: 12px 5px; border: none; background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; z-index: 2; font-weight: bold; font-family: 'Orbitron'; font-size: 9px; }
        .plat.active { color: white; }

        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #1e3a8a; background: rgba(0,0,0,0.3); color: white; outline: none; text-align: center; font-size: 16px; margin-bottom: 15px; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        /* GRID RESULTADO */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid rgba(0,210,255,0.1); }
        .box strong { display: block; font-size: 24px; color: var(--primary); }
        .box span { font-size: 10px; color: #94a3b8; }

        /* AJUSTES */
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
        .setting-item span { font-size: 14px; font-weight: 600; }
        .status-on { color: #00ff88; font-size: 12px; font-weight: bold; }

        /* ANIMACAO INJETAR */
        #inject-anim { display: none; text-align: center; margin-top: 20px; }
        .loader-bar { width: 100%; height: 6px; background: #111; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .loader-progress { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* NAVBAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--primary); z-index: 1000; }
        .nav-item { color: rgba(255,255,255,0.3); text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 10px; }
        .nav-item.active { color: var(--primary); }

        /* QUIZ FULLSCREEN */
        .quiz-full { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(15px); display:flex; align-items:center; justify-content:center; z-index: 9999; }
        .quiz-content { width:85%; max-width:380px; background:var(--card-bg); padding:30px; border-radius:30px; border: 1px solid var(--primary); text-align:center; box-shadow: 0 0 40px rgba(0,0,0,1); }
        .quiz-btn { width:100%; margin-top:12px; padding:16px; border:none; border-radius:12px; background: rgba(255,255,255,0.05); color:white; font-weight:bold; cursor:pointer; transition: 0.2s; }
        .quiz-btn:active { background: var(--primary); color: #000; }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-container"><div class="nebula"></div></div>

<div class="container">
    
    <div id="home" class="tab-content active">
        <div class="banner"><img src="https://i.imgur.com/Z104fSX.png" alt="Banner Elite"></div>
        <div class="card">
            <h2 class="title-main orbitron">⚡️POP SENSI🌀</h2>
            <div class="platform">
                <div class="selector" id="platSelector"></div>
                <button class="plat active" onclick="setPlat(this,0)">ANDROID</button>
                <button class="plat" onclick="setPlat(this,1)">IOS</button>
                <button class="plat" onclick="setPlat(this,2)">EMULADOR</button>
            </div>
            <input type="text" id="phoneModel" placeholder="MODELO DO APARELHO...">
            <button class="btn" onclick="gerar()">⚡ GERAR SENSI VIP</button>
            <div id="quiz-area"></div>
            <div id="res" style="display:none;"></div>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <h2 class="orbitron" style="color:var(--primary); text-align:center; margin-top:20px;">⚙️ SISTEMA ELITE</h2>
        <div class="card">
            <div class="setting-item"><span>🚀 BOOST FPS</span><span class="status-on">ATIVADO</span></div>
            <div class="setting-item"><span>📺 MODO 120HZ</span><span class="status-on">ATIVADO</span></div>
            <div class="setting-item"><span>🎯 HS INJECT V26</span><span class="status-on">PRONTO</span></div>
            <div class="setting-item"><span>⚡ RESPOSTA TOUCH</span><span class="status-on">1MS</span></div>
            
            <button class="btn" style="margin-top:20px; background: linear-gradient(90deg, #ff0055, #7a00ff);" onclick="injetar()">💉 INJETAR OTIMIZAÇÃO</button>
            
            <div id="inject-anim">
                <p id="inject-status" class="orbitron" style="font-size: 10px; margin-top:15px;">INICIANDO BYPASS...</p>
                <div class="loader-bar"><div class="loader-progress" id="p-bar"></div></div>
            </div>
        </div>
    </div>

    <div id="reviews" class="tab-content">
        <h2 class="orbitron" style="color:var(--primary); text-align:center; margin-top:20px;">⭐ ELITE FEEDBACK</h2>
        <div id="feed-list"></div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="changeTab('home', this)"><span>🏠</span><b>Sensi</b></div>
    <div class="nav-item" onclick="changeTab('settings', this)"><span>⚙️</span><b>Ajustes</b></div>
    <div class="nav-item" onclick="changeTab('reviews', this)"><span>⭐</span><b>Feed</b></div>
</div>

<script>
    let etapa = 1;
    let modoSensi = "media";

    // Mudar Abas
    function changeTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    // Seletor Plataforma
    function setPlat(btn, index) {
        document.querySelectorAll(".plat").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("platSelector").style.transform = `translateX(${index * 100}%)`;
    }

    // Gerar Sensi
    function gerar() {
        if(!document.getElementById('phoneModel').value) return alert("Digite o modelo do seu celular!");
        etapa = 1;
        document.getElementById("res").style.display = "none";
        mostrarQuiz();
    }

    function mostrarQuiz() {
        let q = document.getElementById("quiz-area");
        if (etapa === 1) q.innerHTML = tela("🎯 COMO ESTÁ O SEU CAPA?", ["GRUDANDO PEITO", "PASSANDO CABEÇA", "TREMENDO"]);
        else if (etapa === 2) q.innerHTML = tela("🕹️ QUAL SEU ESTILO DE JOGO?", ["RUSHADOR", "SUPORTE", "ESTRATÉGICO"]);
        else if (etapa === 3) q.innerHTML = tela("🔫 ARMA MAIS USADA?", ["ARMAS DE UM TIRO", "SMG ( Thompson/MP40 )", "AR ( SCAR/AK47 )"]);
        else if (etapa === 4) q.innerHTML = tela("🔥 QUAL SENSI VOCÊ QUER?", ["ALTA", "MEDIA", "BAIXA"], true);
        else gerarSensiFinal();
    }

    function tela(p, ops, final = false) {
        return `
        <div class="quiz-full">
            <div class="quiz-content">
                <h3 class="orbitron" style="color:var(--primary); font-size:16px; margin-bottom:20px;">${p}</h3>
                ${ops.map(o => `<button class="quiz-btn" onclick="proximo('${o}', ${final})">${o}</button>`).join("")}
            </div>
        </div>`;
    }

    function proximo(val, final) {
        if(final) modoSensi = val.toLowerCase();
        etapa++;
        mostrarQuiz();
    }

    function gerarSensiFinal() {
        document.getElementById("quiz-area").innerHTML = "";
        let r = document.getElementById("res");
        r.style.display = "block";
        
        let min = modoSensi === "alta" ? 170 : (modoSensi === "media" ? 120 : 80);
        let max = min + 30;

        const s = { g: rand(min, max), rd: rand(min, max), x2: rand(min, max), x4: rand(min, max), aw: rand(30, 50), bt: rand(42, 55) };

        r.innerHTML = `
            <div class="grid">
                <div class="box"><strong>${s.g}</strong><span>GERAL</span></div>
                <div class="box"><strong>${s.rd}</strong><span>RED DOT</span></div>
                <div class="box"><strong>${s.x2}</strong><span>MIRA 2X</span></div>
                <div class="box"><strong>${s.x4}</strong><span>MIRA 4X</span></div>
                <div class="box"><strong>590</strong><span>DPI</span></div>
                <div class="box"><strong>${s.bt}%</strong><span>BOTÃO</span></div>
            </div>
            <button class="btn" style="margin-top:20px;" onclick="alert('Copiado com sucesso!')">📋 COPIAR CONFIGURAÇÃO</button>
        `;
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }

    // Função Injetar com Animação
    function injetar() {
        const area = document.getElementById('inject-anim');
        const bar = document.getElementById('p-bar');
        const status = document.getElementById('inject-status');
        area.style.display = 'block';
        let p = 0;
        
        const frases = ["LIMPANDO CACHE...", "OTIMIZANDO REGISTRY...", "INJETANDO HS V26...", "ATIVANDO 120HZ...", "SUCESSO!"];
        
        const int = setInterval(() => {
            p += 2;
            bar.style.width = p + "%";
            status.innerText = frases[Math.floor(p/25)] || "FINALIZANDO...";
            
            if(p >= 100) {
                clearInterval(int);
                alert("OTIMIZAÇÃO APLICADA COM SUCESSO! ✅");
            }
        }, 50);
    }

    // Carregar Feedbacks
    const players = [
        {n: "Nobru", t: "Essa sensibilidade tá um absurdo de boa! 🔥"},
        {n: "Two9", t: "Parece que o celular ficou mais leve, só capa!"},
        {n: "Bak", t: "Melhor otimização que já testei na V26."},
        {n: "Thurzin", t: "A mira grudou e não saiu mais. Nota 10!"},
        {n: "Lzinn", t: "O injetor de FPS realmente funciona, 120hz liso."},
        {n: "Ghost_FF", t: "Sensi de emulador no mobile, gratidão!"},
        {n: "Sniper_God", t: "A mira AWM ficou perfeita."},
        {n: "Moreira_XP", t: "Gruda muito na cabeça, surreal."},
        {n: "Vitin_FF", t: "Meu Poco F5 virou um monstro agora."},
        {n: "Flash_Kill", t: "Recomendo pra todos os rushadores!"}
    ];

    document.getElementById('feed-list').innerHTML = players.map(p => `
        <div class="card" style="margin-bottom:12px; padding:15px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:10px; height:10px; background:var(--primary); border-radius:50%;"></div>
                <b style="color:var(--primary)">${p.n}</b>
            </div>
            <p style="font-size:13px; margin:8px 0 0 0; color:#ccc;">"${p.t}"</p>
        </div>
    `).join("");

</script>
</body>
</html>
