<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<title>POP SENSI🌀</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background: radial-gradient(circle at top,#0a0f2c,#000);
  color:white;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(#00aaff10 1px,transparent 1px),
             linear-gradient(90deg,#00aaff10 1px,transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

.container{
  padding:15px;
}

.banner img{
  width:100%;
  border-radius:20px;
  box-shadow:0 0 40px #00aaff;
}

.card{
  margin-top:15px;
  background:#0a0f1f;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 25px #00aaff33;
}

.title{
  text-align:center;
  color:#00aaff;
  text-shadow:0 0 10px #00aaff;
}

.platform{
  position:relative;
  display:flex;
  background:#0a0f1f;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.selector{
  position:absolute;
  top:5px;
  left:5px;
  width:33.33%;
  height:calc(100% - 10px);
  background:linear-gradient(45deg,#00aaff,#0066ff);
  border-radius:8px;
  transition:0.3s;
  box-shadow:0 0 15px #00aaff;
}

.plat{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  color:#aaa;
  cursor:pointer;
  z-index:2;
}

.plat.active{
  color:white;
}

input, select{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#111827;
  color:white;
}

.btn{
  margin-top:12px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00aaff,#0066ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px #00aaff;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.03);
}

.btn2{
  margin-top:10px;
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #00aaff;
  background:transparent;
  color:#00aaff;
  cursor:pointer;
}

/* QUIZ */
.quiz-full{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000c;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.quiz-content{
  width:90%;
  max-width:400px;
  background:#0a0f1f;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 30px #00aaff;
  text-align:center;
  animation:zoom .3s;
}

@keyframes zoom{
  from{transform:scale(0.8); opacity:0}
  to{transform:scale(1); opacity:1}
}

.quiz-btn{
  width:100%;
  margin-top:8px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:#00aaff;
  cursor:pointer;
}

.quiz-btn:hover{
  background:linear-gradient(45deg,#00aaff,#0066ff);
  color:white;
}

/* RESULT */
.result{
  display:none;
  margin-top:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 10px #00aaff33;
}

.box strong{
  display:block;
  font-size:20px;
  color:#00aaff;
}

/* 🔥 AJUSTES PEDIDOS */
.dpi-box{
  grid-column:auto;
}

.fire-box{
  margin-top:15px;
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 10px #00aaff33;
}

.fire-box span{
  display:block;
  font-size:14px;
  color:#aaa;
}

.fire-box strong{
  font-size:20px;
  color:#00aaff;
}

/* REVIEWS */
.review{
  background:#0a0f1f;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  box-shadow:0 0 10px #00aaff22;
}
</style>
</head>

<body>

<div class="container">

  <div class="banner">
    <img src="https://i.imgur.com/Z104fSX.png">
  </div>

  <div class="card">
    <h2 class="title">⚡️POP SENSI🌀</h2>

    <div class="platform">
      <div class="selector"></div>
      <button class="plat active" onclick="setPlat(this,0)">🤖ANDROID</button>
      <button class="plat" onclick="setPlat(this,1)">🍎IOS</button>
      <button class="plat" onclick="setPlat(this,2)">🖱EMULADOR</button>
    </div>

    <input placeholder="Modelo do celular ex: IPhone 17">

    <button class="btn" onclick="gerar()">⚡ GERAR SENSI</button>
    <button class="btn2" onclick="seguir()">🪄 SIGA O DONO</button>

    <div id="quiz"></div>
    <div class="result" id="res"></div>

  </div>

  <div class="review">⭐⭐⭐⭐⭐ "Brabo demais!" - xX_FlashKill_Xx</div>
  <div class="review">⭐⭐⭐⭐⭐ "Subi mestre fácil 🔥" - ProHeadShot77</div>
  <div class="review">⭐⭐⭐⭐⭐ "Melhor sensi da vida!" - GhostRush</div>
  <div class="review">⭐⭐⭐☆☆ "Muito apelão slk 😈" - SniperGod</div>
  <div class="review">⭐⭐⭐⭐⭐ "Só capa agora 🔥🔥" - AK_Dominador</div>
  <div class="review">⭐️⭐️⭐️⭐️☆ "Melhores sensi para farmar em ap🏹" - Fantasma</div>
  
</div>

<script>
function setPlat(btn,index){
  document.querySelectorAll(".plat").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelector(".selector").style.transform=`translateX(${index*100}%)`;
}

function seguir(){
  window.open("https://www.tiktok.com","_blank");
}

let etapa=1;
let respostas={};

function gerar(){
  document.getElementById("res").style.display="none";
  etapa=1;
  respostas={};
  mostrarPergunta();
}

function mostrarPergunta(){
  let q=document.getElementById("quiz");

  if(etapa===1) q.innerHTML=tela("🔥 VOCÊ DA MUITO CAPA?",["SIM","NAO","MAIS OU MENOS"]);
  else if(etapa===2) q.innerHTML=tela("🎯 MIRA GRUDA NO PEITO?",["SIM","NAO","MAIS OU MENOS"]);
  else if(etapa===3) q.innerHTML=tela("⚙️ SUA SENSI?",["🟢ALTA","🟡MEDIA","🔴BAIXA"]);
  else if(etapa===4) q.innerHTML=tela("🔫 ESTILO?",["🔴CAPA EXTREMO","🏹SNIPER","🤡LOUCO DA UMP"]);
  else gerarFinal();
}

function tela(p,ops){
  return `
  <div class="quiz-full">
    <div class="quiz-content">
      <h3>${p}</h3>
      ${ops.map(o=>`<button class="quiz-btn" onclick="resp('${o}')">${o}</button>`).join("")}
    </div>
  </div>`;
}

function resp(r){
  respostas["p"+etapa]=r;
  etapa++;
  mostrarPergunta();
}

function gerarFinal(){
  let d={
    geral:rand(150,200),
    red:rand(140,180),
    x2:rand(130,170),
    x4:rand(100,160),
    awm:rand(50,150),
    botao:rand(30,70),
    dpi:rand(300,800)
  };

  document.getElementById("quiz").innerHTML="";

  let r=document.getElementById("res");
  r.style.display="block";

  r.innerHTML=`
  <h3 style="text-align:center;">🔥 SUA SENSI 🔥</h3>

  <div class="grid">
    <div class="box"><strong>${d.geral}</strong>🎯GERAL</div>
    <div class="box"><strong>${d.red}</strong>🔴PONTO VERMELHO</div>
    <div class="box"><strong>${d.x2}</strong>🔥2X</div>
    <div class="box"><strong>${d.x4}</strong>🔫4X</div>
    <div class="box"><strong>${d.awm}</strong>🏹AWM</div>
    <div class="box"><strong>${d.dpi}</strong>⚙️DPI</div>
  </div>

  <div class="grid">
    <div class="box">
      <strong>${d.botao}</strong>🔥BOTÃO
    </div>
  </div>

  <button class="btn" onclick="copiar()">📋 COPIAR SENSI</button>
  `;
}

function copiar(){
  let texto=document.getElementById("res").innerText;
  navigator.clipboard.writeText(texto);
  alert("Sensi copiada 🔥");
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min)+min);
}
</script>

</body>
</html>
