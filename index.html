<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>POP SENSI Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: linear-gradient(180deg, #0b1c3a, #09142b);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 300px;
  box-shadow: 0 0 30px #00c3ff33;
}

h1 {
  color: white;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 30px;
  border: none;
  outline: none;
  background: linear-gradient(90deg, #3a0ca3, #00c3ff);
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 30px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.login {
  background: linear-gradient(90deg, #3a0ca3, #00c3ff);
  color: white;
}

.vip {
  background: linear-gradient(90deg, #00c3ff, #3a0ca3);
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <h1>POP SENSI 🌊</h1>
  <p style="color: #aaa;">Acesso restrito – Seja bem-vindo</p>

  <input type="email" id="email" placeholder="📧 Email">
  <input type="password" id="senha" placeholder="🔒 Senha">

  <button class="login" onclick="login()">Entrar</button>
  <button class="vip">💎 COMPRAR ACESSO VIP</button>
</div>

<script>
const SUPABASE_URL = "https://dlmxjipcacfvyclchexq.supabase.co";
const SUPABASE_KEY = "sb_publishable_eorR3kTsgC-vPMxnBfc6mg_cjRzQONY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    alert("Email ou senha incorretos!");
  } else {
    alert("Login realizado com sucesso!");
    window.location.href = "painel.html";
  }
}
</script>

</body>
</html>
