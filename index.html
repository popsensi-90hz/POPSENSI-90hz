<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP SENSI - Premium Blue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020817;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(200,100%,10%,1) 0, transparent 50%);
            overflow: hidden;
            color: #fff;
        }

        .card {
            position: relative;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 25px;
            width: 380px;
            text-align: center;
            border: 1px solid rgba(0, 191, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: 50%;
            transform: translateX(-50%);
            width: 80%; height: 2px;
            background: linear-gradient(90deg, transparent, #00bfff, transparent);
            box-shadow: 0 0 15px #00bfff;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 18px;
            border: 2px solid #00bfff;
            box-shadow: 0 0 25px rgba(0, 191, 255, 0.5);
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: #00bfff;
            text-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
        }

        p {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4dabff;
            margin-bottom: 35px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #1e3a8a;
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
            transition: 0.3s;
            font-weight: bold;
        }

        input:focus {
            border-color: #00bfff;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.3);
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, #1e40af, #00bfff);
            color: white;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .btn-main:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.4);
        }

        .btn-vip {
            width: 100%;
            background: transparent;
            color: #00bfff;
            padding: 13px;
            border-radius: 10px;
            border: 2px solid #00bfff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-vip:hover {
            background: rgba(0, 191, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 191, 255, 0.2);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.imgur.com/Z9IoRnb.png" alt="Logo" class="logo-img">
        <h1>POP SENSI</h1>
        <p>Acesso Restrito</p>

        <input type="text" id="accessKey" placeholder="DIGITE SUA KEY">
        <button onclick="validarAcesso()" class="btn-main">ENTRAR NO SERVIDOR</button>

        <button class="btn-vip">💎 COMPRAR ACESSO VIP</button>

        <div class="footer-text">
            SISTEMA DE SEGURANÇA POP SENSI &copy; 2026
        </div>
    </div>

    <script>
        function validarAcesso() {
            const keyInput = document.getElementById('accessKey').value;
            const keyCorreta = "POPSENS26";

            if (keyInput === keyCorreta) {
                alert("Acesso Autorizado! Carregando painel...");
                window.location.href = "home.html";
            } else {
                alert("Key Inválida! Tente novamente ou compre seu acesso VIP.");
            }
        }
    </script>

</body>
</html>
